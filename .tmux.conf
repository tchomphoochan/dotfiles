set -g default-terminal "screen-256color"
set -g mouse on
set-option -sa terminal-overrides ",alacritty*:Tc"

# Vim style pane selection
bind h select-pane -L
bind j select-pane -D 
bind k select-pane -U
bind l select-pane -R

# Start windows and panes at 1, not 0
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Use Ctrl-arrow keys without prefix key to switch panes
bind -n C-Left select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up select-pane -U
bind -n C-Down select-pane -D

# Use Ctrl-vim keys without prefix key to switch panes
bind -n C-h select-pane -L
bind -n C-l select-pane -R
bind -n C-k select-pane -U
bind -n C-j select-pane -D

# Alt arrow to switch windows
bind -n M-Left  previous-window
bind -n M-Right next-window

# Alt vim keys to switch windows
bind -n M-h previous-window
bind -n M-l next-window

# Standard keybinds for splitting, but set to current path
bind '"' split-window -v -c "#{pane_current_path}"
bind '%' split-window -h -c "#{pane_current_path}"

# More sensible keybinds for splitting
bind '-' split-window -v -c "#{pane_current_path}"
bind '|' split-window -h -c "#{pane_current_path}"

# Enable vi-style keys for copy mode
setw -g mode-keys vi

# Use 'v' to begin selection as in Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Use 'y' to yank current selection to Wayland clipboard
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"

# Copy to Wayland
set -s copy-command 'wl-copy'

# Bind 'p' to paste from Wayland clipboard into tmux
bind p run "wl-paste -n | tmux load-buffer - ; tmux paste-buffer"

# Enable OSC 52 support (allows terminal-native clipboard access)
set -s set-clipboard on
